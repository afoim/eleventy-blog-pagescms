media: public/img

actions:
  - name: deploy
    label: Deploy to Cloudflare
    workflow: deploy.yml
    ref: main
    confirm:
      title: 部署到 Cloudflare Workers？
      message: 将构建站点并部署到 Cloudflare Workers。
      button: Deploy

content:
  - name: posts
    label: Posts
    type: collection
    path: content/blog
    filename:
      template: "{primary}.md"
      field: true
    view:
      fields: [ title, coverImage, draft, date ]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: string }
      - { name: coverImage, label: 封面图, type: image }
      - { name: date, label: Date, type: date }
      - { name: draft, label: Draft, type: boolean }
      - { name: pin, label: 置顶, type: boolean }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: body, label: Body, type: rich-text }
  - name: about
    label: About page
    type: file
    path: content/about/index.md
    fields:
      - { name: layout, type: string, hidden: true, default: layouts/base.njk }
      - name: eleventyNavigation
        label: Navigation
        type: object
        fields:
          - { name: key, label: 标识, type: string }
          - { name: order, label: Order, type: number }
      - { name: body, label: Body, type: rich-text }
  - name: metadata
    label: Metadata
    type: file
    path: _data/metadata.js
    format: code
